<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Band Songs</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<input id="search" placeholder="Search..." onkeyup="searchSongs()">

<div id="song-grid"></div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="modal">
    <img id="info-cover">
    <h2 id="info-title"></h2>
    <p id="info-artist"></p>

    <p><b>Genre:</b> <span id="info-genre"></span></p>
    <p><b>Charter:</b> <span id="info-charter"></span></p>
    <p><b>Release:</b> <span id="info-release"></span></p>
    <p><b>Source:</b> <span id="info-source"></span></p>
    <p><b>Rating:</b> <span id="info-rating"></span></p>

    <div id="info-difficulties"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
