<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Band HD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="assets/logo.png" class="logo">
    <div class="title-group">
      <p class="subtitle">Website is still work-in-progress, bugs are to be expected.</p>
    </div>
  </div>

  <div class="header-center">
    <input type="text" id="search" placeholder="Search songs or artists...">
    <button id="randomSong" class="tab">🎲 Random Song</button>

    <div class="sort-buttons">
      <button data-sort="title">Sort by Song</button>
      <button data-sort="artist">Sort by Artist</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="rb1"><img src="assets/rb1.png"></button>
      <button class="tab" data-tab="rb1dlc"><img src="assets/rb1dlc.png"></button>
      <button class="tab" data-tab="rb2"><img src="assets/rb2.png"></button>
      <button class="tab" data-tab="rb2dlc"><img src="assets/rb2dlc.png"></button>
      <button class="tab" data-tab="tbrb"><img src="assets/tbrb.png"></button>
      <button class="tab" data-tab="tbrbdlc"><img src="assets/tbrbdlc.png"></button>
      <button class="tab" data-tab="lrb"><img src="assets/lrb.png"></button>
      <button class="tab" data-tab="gdrb"><img src="assets/gdrb.png"></button>
      <button class="tab" data-tab="rb3"><img src="assets/rb3.png"></button>
      <button class="tab" data-tab="rb3dlc"><img src="assets/rb3dlc.png"></button>
      <button class="tab" data-tab="rb_blitz"><img src="assets/rb_blitz.png"></button>
      <button class="tab" data-tab="rb4"><img src="assets/rb4.png"></button>
      <button class="tab" data-tab="rb4dlc"><img src="assets/rb4dlc.png"></button>
      <button class="tab" data-tab="rb4rivals"><img src="assets/rb4rivals.png"></button>
    </div>
  </div>

  <div class="header-right">
    <p id="song-count"></p>
  </div>
</header>

<main>
  <div id="song-grid" class="song-grid"></div>
</main>

<footer>
  <p>This project is not affiliated with Harmonix.</p>
</footer>

<!-- Overlay -->
<div id="song-info-overlay" class="song-info-overlay">
  <div class="overlay-bg"></div>

  <div class="song-info-modal">
    <button class="close-info" id="closeOverlay">✕</button>

    <div class="info-left">
      <img id="info-cover" class="song-info-cover">
    </div>

    <div class="info-middle">
      <div id="info-title" class="info-title"></div>
      <div id="info-artist" class="info-artist"></div>

      <div class="info-meta">
        <div id="info-album"></div>
        <div id="info-year"></div>
      </div>

      <div class="difficulty-grid">
        <div class="diff-box">
          <img src="assets/guitar.png" class="diff-icon">
          <div id="info-guitar"></div>
        </div>

        <div class="diff-box">
          <img src="assets/proguitar.png" class="diff-icon">
          <div id="info-proguitar"></div>
        </div>

        <div class="diff-box">
          <img src="assets/bass.png" class="diff-icon">
          <div id="info-bass"></div>
        </div>

        <div class="diff-box">
          <img src="assets/probass.png" class="diff-icon">
          <div id="info-probass"></div>
        </div>

        <div class="diff-box">
          <img src="assets/keys.png" class="diff-icon">
          <div id="info-keys"></div>
        </div>

        <div class="diff-box">
          <img src="assets/prokeys.png" class="diff-icon">
          <div id="info-prokeys"></div>
        </div>

        <div class="diff-box">
          <img src="assets/drums.png" class="diff-icon">
          <div id="info-drums"></div>
        </div>

        <div class="diff-box">
          <img id="info-vocals-icon" src="assets/vocals.png" class="diff-icon">
          <div id="info-vocals"></div>
        </div>
      </div>
    </div>

    <div class="info-right">

      <div class="info-section">
        <div class="info-label">GENRE</div>
        <div id="info-genre" class="info-value"></div>
      </div>

      <div class="info-section">
        <div class="info-label">SOURCE</div>
        <div class="info-value">
          <img id="info-source-icon" class="source-icon-overlay">
          <span id="info-source-text"></span>
        </div>
      </div>

      <div class="info-section">
        <div class="info-label">SONG RATING</div>
        <div id="info-rating" class="info-value"></div>
      </div>

      <div class="info-section">
        <div class="info-label">RELEASE</div>
        <div id="info-release" class="info-value"></div>
      </div>

      <div class="info-section">
        <div class="info-label">CHARTER</div>
        <div id="info-charter" class="info-value"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ==========================
// Main JS
// ==========================
let songs = [];
let currentTab = "all";
let sortDirection = 1;

window.addEventListener("DOMContentLoaded", async () => {
  await loadSongs(currentTab);
  setupOverlayClose();
  setupGoldToggle();
  setupRandomButton();
  setupSongClickHandler();
});

function setupSongClickHandler() {
  const grid = document.getElementById("song-grid");
  if (!grid) return;

  grid.addEventListener("click", function (e) {
    const target = e.target;
    const songCard = target.closest(".song");
    if (!songCard) return;

    const dropdown = songCard.querySelector(".difficulty-dropdown");

    if (target.classList.contains("more-info-btn")) {
      const title = songCard.dataset.title?.trim().toLowerCase();
      const song = songs.find((s) => s.title?.trim().toLowerCase() === title);
      if (song) openSongInfo(song);
      return;
    }

    if (dropdown && !target.classList.contains("song-download")) {
      const isOpen = dropdown.classList.contains("open");
      document.querySelectorAll(".difficulty-dropdown.open").forEach((d) => d.classList.remove("open"));
      if (!isOpen) dropdown.classList.add("open");
    }
  });
}

async function loadSongs(tab) {
  let files = [];
  if (tab === "all") {
    try {
      const index = await fetch("./songlists/index.json");
      files = await index.json();
    } catch (err) { console.error("Failed to load index.json", err); return; }
  } else { files = [tab]; }

  let loadedSongs = [];
  for (const file of files) {
    try {
      const res = await fetch(`./songlists/${file}.json`);
      if (!res.ok) continue;
      const data = await res.json();
      loadedSongs.push(...data);
    } catch (err) { console.warn(`Error loading ${file}.json`, err); }
  }

  songs = loadedSongs.sort((a, b) => a.title.localeCompare(b.title));
  displaySongs(songs);

  const counter = document.getElementById("song-count");
  if (counter) counter.innerText = songs.length + " songs";
}

function getInstrumentIcon(inst, song) {
  if (inst === "vocals") { let harm = song.Harm || song.harm || 1; return `./assets/vocals${harm > 1 ? harm : ""}.png`; }
  return `./assets/${inst}.png`;
}

function createDifficulty(level) {
  level = Number(level);
  if (level == null || level === -1 || isNaN(level)) return `<div class="no-part">NO PART</div>`;
  let bars = "";
  for (let i = 1; i <= 5; i++) {
    if (level === 6) bars += `<div class="diff red"></div>`;
    else if (i <= level) bars += `<div class="diff filled"></div>`;
    else bars += `<div class="diff"></div>`;
  }
  return `<div class="diff-row">${bars}</div>`;
}

function displaySongs(songList) {
  const grid = document.getElementById("song-grid");
  if (!grid) return;
  grid.innerHTML = "";

  songList.forEach((song) => {
    const card = document.createElement("div");
    card.className = `song ${song.category || ""} ${song.gold ? "gold" : ""}`;
    card.dataset.title = song.title;

    const rating = song.rating || "NR";
    const coverTag = song.master === false ? `<div class="cover-tag">COVER</div>` : "";
    const cover = song.cover || "./assets/default_cover.png";
    const file = song.file || "";
    const difficulty = song.difficulty || {};

    let sourceText = "";
    switch (song.category) {
      case "rb1": sourceText = "Rock Band"; break;
      case "rb1dlc": sourceText = "Rock Band DLC"; break;
      case "rb4rivals": sourceText = "Rock Band Rivals"; break;
      default: sourceText = song.category || "";
    }

    const sourceIcon = song.category ? `<img class="source-icon" src="./assets/${song.category}.png">` : "";

    card.innerHTML = `
      <div class="cover-container">
        <img src="${cover}">${coverTag}
      </div>
      <h3><a class="song-download ${file ? "" : "disabled"}" ${file ? `href="${file}" download` : ""}>${song.title}</a></h3>
      <p>${song.artist || ""}</p>
      <div class="genre-row">
        <div class="source-row">
          ${sourceIcon}
          <span class="source-text">${sourceText}</span>
        </div>
        <span class="genre-tag ${song.genre?.toLowerCase().replace(/[^a-z]/g, "") || ""}">${song.genre || ""}</span>
        <span class="song-rating ${rating}">${rating}</span>
      </div>

      <div class="difficulty-dropdown">
        ${["guitar","bass","drums","vocals","proguitar","probass","keys","prokeys"].map(inst => `
          <div class="instrument">
            <img class="instrument-icon" src="${getInstrumentIcon(inst, song)}">
            ${createDifficulty(difficulty[inst])}
          </div>
        `).join("")}
      </div>

      <button class="more-info-btn">More Info</button>
    `;

    grid.appendChild(card);
  });
}

// ... continue with safe openSongInfo, closeSongInfo, overlay logic, search, sort, tabs, random, gold toggle ...
// (same as the JS I gave you in the previous message, just integrated here)

</script>

<script>
// ==========================
// Hook UI to JS
// ==========================

document.getElementById("search")?.addEventListener("keyup", searchSongs);

document.querySelectorAll("[data-sort]").forEach(btn => {
  btn.addEventListener("click", () => sortSongs(btn.dataset.sort));
});

document.querySelectorAll("[data-tab]").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
});

document.getElementById("closeOverlay")?.addEventListener("click", closeSongInfo);
</script>

</body>
</html>
